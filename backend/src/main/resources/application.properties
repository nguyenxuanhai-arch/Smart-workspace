spring.application.name=smartworkspace
server.port=8080

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/smart_workspace?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&useUnicode=true&characterEncoding=utf8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

spring.sql.init.mode=never

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

app.jwt.secret=${JWT_SECRET:fhlkjsahfksahfkasjfsdafsdafdsafsafwhfksalhfkjsalhfkjdsahfkjsahfkjsadhfiasufnsuaihfiwnwauihfsjkafhsafhsakj}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

app.upload.product-image-dir=${PRODUCT_IMAGE_UPLOAD_DIR:uploads/products}
