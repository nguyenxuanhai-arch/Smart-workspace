services:
  db:
    image: mysql:8.4
    container_name: smart-workspace-db
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-smart_workspace}
      MYSQL_USER: ${DB_USERNAME:-smart_workspace}
      MYSQL_PASSWORD: ${DB_PASSWORD:-smart_workspace_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-smart_workspace_root_password}
    ports:
      - "${MYSQL_BIND_ADDRESS:-127.0.0.1}:${MYSQL_PORT:-3306}:3306"
    volumes:
      - smart_workspace_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
    container_name: smart-workspace-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: ${DB_URL:-jdbc:mysql://db:3306/smart_workspace?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&useUnicode=true&characterEncoding=utf8}
      DB_USERNAME: ${DB_USERNAME:-smart_workspace}
      DB_PASSWORD: ${DB_PASSWORD:-smart_workspace_password}
      JWT_SECRET: ${JWT_SECRET:-change-this-docker-secret-to-at-least-32-characters}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      JWT_REFRESH_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS:-604800000}
      PRODUCT_IMAGE_UPLOAD_DIR: /app/uploads/products
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:-http://localhost}
      APP_PUBLIC_API_URL: ${APP_PUBLIC_API_URL:-http://localhost}
      PAYOS_CLIENT_ID: ${PAYOS_CLIENT_ID:-}
      PAYOS_API_KEY: ${PAYOS_API_KEY:-}
      PAYOS_CHECKSUM_KEY: ${PAYOS_CHECKSUM_KEY:-}
      PAYOS_BASE_URL: ${PAYOS_BASE_URL:-https://api-merchant.payos.vn}
      JAVA_OPTS: ${JAVA_OPTS:-}
    ports:
      - "${BACKEND_BIND_ADDRESS:-127.0.0.1}:${BACKEND_PORT:-8080}:8080"
    volumes:
      - smart_workspace_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_ASSET_BASE_URL: ${VITE_ASSET_BASE_URL:-}
    container_name: smart-workspace-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_BIND_ADDRESS:-0.0.0.0}:${FRONTEND_PORT:-80}:80"

volumes:
  smart_workspace_mysql:
  smart_workspace_uploads:
